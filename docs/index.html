<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KAEL // Macro & AI Signal Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0D12;
    --surface: #12161D;
    --surface-2: #171C25;
    --border: #232A35;
    --text: #E6E9EF;
    --text-muted: #7A8494;
    --up: #2FD97F;
    --down: #FF5C5C;
    --amber: #FFB020;
    --cyan: #4CC9F0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .ticker {
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    white-space: nowrap;
    padding: 8px 0;
  }
  .ticker-track {
    display: inline-block;
    animation: scroll 40s linear infinite;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.02em;
  }
  .ticker-track span { margin-right: 40px; color: var(--text-muted); }
  .ticker-track .val { color: var(--text); font-weight: 500; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  header {
    padding: 32px 24px 20px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .brand {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .headline {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 600;
    line-height: 1.35;
    max-width: 720px;
  }
  .timestamp {
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 14px;
  }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }
  section { margin-top: 40px; }
  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 14px;
  }
  .econ-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }
  .econ-card {
    background: var(--surface);
    padding: 16px;
  }
  .econ-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .econ-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
  }
  .econ-change {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 4px;
  }
  .econ-change.up { color: var(--up); }
  .econ-change.down { color: var(--down); }

  .chain {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 18px 20px;
    margin-bottom: 12px;
    border-left: 3px solid var(--text-muted);
  }
  .chain.conf-high { border-left-color: var(--up); }
  .chain.conf-medium { border-left-color: var(--amber); }
  .chain.conf-low { border-left-color: var(--down); }
  .chain-flow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--cyan);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .chain-mechanism {
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .chain-assets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 3px;
    color: var(--text-muted);
  }

  .news-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 720px) { .news-grid { grid-template-columns: 1fr; } }
  .news-block {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px;
  }
  .news-summary {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
  }

  .risk-strip {
    background: linear-gradient(90deg, rgba(255,176,32,0.08), transparent);
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    padding: 16px 20px;
  }
  .risk-strip ul { list-style: none; }
  .risk-strip li {
    font-size: 13px;
    padding: 6px 0;
    color: var(--text);
  }
  .risk-strip li::before { content: "⚠ "; color: var(--amber); }

  .empty-state {
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 40px 0;
  }
  footer {
    text-align: center;
    padding: 30px 0;
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="ticker"><div class="ticker-track" id="tickerTrack"></div></div>

<header>
  <div class="brand">Kael // Macro & AI Signal Terminal</div>
  <div class="headline" id="headlineText">Memuat laporan terbaru...</div>
  <div class="timestamp" id="timestamp"></div>
</header>

<main>
  <section>
    <div class="section-label">Data Ekonomi US Terbaru</div>
    <div class="econ-grid" id="econGrid"></div>
  </section>

  <section>
    <div class="section-label">Correlation Chain — Kenapa Ini Penting</div>
    <div id="correlationList"></div>
  </section>

  <section>
    <div class="news-grid">
      <div class="news-block">
        <div class="section-label">AI & Tech</div>
        <div class="news-summary" id="aiSummary"></div>
      </div>
      <div class="news-block">
        <div class="section-label">Global & Geopolitik</div>
        <div class="news-summary" id="globalSummary"></div>
      </div>
    </div>
  </section>

  <section>
    <div class="section-label">Risk Flags Minggu Ini</div>
    <div class="risk-strip"><ul id="riskList"></ul></div>
  </section>
</main>

<footer>Auto-generated by Rafliyan's market bot · data: FRED, RSS · analysis: Claude</footer>

<script>
async function loadReport() {
  try {
    const res = await fetch('report.json?_=' + Date.now());
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('headlineText').innerHTML =
      '<span class="empty-state">Belum ada report.json — jalankan workflow dulu (Actions → Run workflow).</span>';
  }
}

function fmtNum(v) {
  if (v === null || v === undefined) return '—';
  return Number(v).toLocaleString('en-US', { maximumFractionDigits: 2 });
}

function render(data) {
  const analysis = data.analysis || {};
  const econ = data.raw_economic_data || {};
  const news = data.raw_news || {};

  document.getElementById('headlineText').textContent =
    analysis.headline || 'Analisis belum tersedia untuk periode ini.';
  document.getElementById('timestamp').textContent =
    'Terakhir update: ' + new Date(data.generated_at).toLocaleString('id-ID');

  // Ticker
  const tickerItems = Object.values(econ).map(e =>
    `<span>${e.label}: <span class="val">${fmtNum(e.value)}</span></span>`
  ).join('');
  document.getElementById('tickerTrack').innerHTML = tickerItems + tickerItems;

  // Economic grid
  const econGrid = document.getElementById('econGrid');
  econGrid.innerHTML = Object.values(econ).map(e => {
    const changeClass = e.change_pct > 0 ? 'up' : e.change_pct < 0 ? 'down' : '';
    const arrow = e.change_pct > 0 ? '▲' : e.change_pct < 0 ? '▼' : '–';
    return `
      <div class="econ-card">
        <div class="econ-label">${e.label}</div>
        <div class="econ-value">${fmtNum(e.value)}</div>
        <div class="econ-change ${changeClass}">${arrow} ${e.change_pct ?? '—'}% vs sebelumnya</div>
      </div>`;
  }).join('');

  // Correlation chains
  const chains = analysis.correlation_analysis || [];
  const chainContainer = document.getElementById('correlationList');
  chainContainer.innerHTML = chains.length ? chains.map(c => `
    <div class="chain conf-${(c.confidence || 'low').toLowerCase()}">
      <div class="chain-flow">${c.trigger} → dampak lintas aset</div>
      <div class="chain-mechanism">${c.mechanism}</div>
      <div class="chain-assets">
        ${(c.affected_assets || []).map(a => `<span class="chip">${a}</span>`).join('')}
        <span class="chip">confidence: ${c.confidence || 'n/a'}</span>
      </div>
    </div>
  `).join('') : '<div class="empty-state">Belum ada analisis korelasi.</div>';

  document.getElementById('aiSummary').textContent =
    analysis.ai_tech_summary || 'Belum ada ringkasan.';
  document.getElementById('globalSummary').textContent =
    analysis.global_summary || 'Belum ada ringkasan.';

  const risks = analysis.risk_flags || [];
  document.getElementById('riskList').innerHTML = risks.length
    ? risks.map(r => `<li>${r}</li>`).join('')
    : '<li>Tidak ada risk flag signifikan.</li>';
}

loadReport();
</script>
</body>
</html>
