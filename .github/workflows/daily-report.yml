name: Daily Market & AI Report

on:
  schedule:
    # Jalan 2x sehari: 06:00 dan 18:00 UTC (13:00 & 01:00 WIB)
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch: {}   # ini nambahin tombol "Run workflow" manual di GitHub

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch raw data (FRED + RSS)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Generate report via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_report.py

      - name: Commit updated report
        run: |
          git config user.name "market-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/report.json raw_data.json
          git diff --quiet --cached || git commit -m "Auto-update report $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
